plugins {
    id 'java'
}

group = 'io.vishwa'
version = '0.1.0'

repositories {
    mavenCentral()
}

dependencies {
    compileOnly fileTree(
        dir: '/opt/homebrew/Cellar/ballerina/2201.12.6/libexec/distributions/ballerina-2201.13.1/bre/lib',
        include: ['ballerina-rt-*.jar']
    )
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

jar {
    archiveFileName = 'imagecrop-native.jar'
}
